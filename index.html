<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE RAWEZH PROTOCOL | KURDAX11</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --matrix-green: #00ff41;
            --bg-black: #000a00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; }

        body {
            background-color: var(--bg-black);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #matrix-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
            opacity: 0.3;
        }

        .interface {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 10vw, 5rem);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 15px;
            text-shadow: 0 0 20px var(--matrix-green);
            margin-bottom: 20px;
            animation: glitch 2s infinite;
        }

        .kurdax-tag {
            color: var(--matrix-green);
            letter-spacing: 5px;
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.7;
        }

        #start-btn {
            margin-top: 40px;
            padding: 20px 50px;
            background: transparent;
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 3px;
        }

        #start-btn:hover {
            background: var(--matrix-green);
            color: black;
            box-shadow: 0 0 40px var(--matrix-green);
        }

        @keyframes glitch {
            0% { transform: skew(0deg); }
            2% { transform: skew(10deg); color: #0ff; }
            4% { transform: skew(-10deg); color: #f0f; }
            6% { transform: skew(0deg); }
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <audio id="local-audio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="interface">
        <h1>rawezh is my daddy</h1>
        <p class="kurdax-tag">coded by kurdax11</p>
        <button id="start-btn">INITIALIZE SYSTEM</button>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('local-audio');
        const btn = document.getElementById('start-btn');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 10, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        setInterval(draw, 33);

        btn.onclick = () => {
            audio.play().catch(e => console.log("Audio file 'music.mp3' not found in folder."));
            btn.style.display = 'none';
        };
    </script>
</body>
</html>
